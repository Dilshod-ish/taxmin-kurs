name: Telegram bot

on:
  # schedule:
  #   - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: telegram-bot-runner
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - name: Kodni olish
        uses: actions/checkout@v4

      - name: Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kutubxonalarni o'rnatish
        run: pip install -r requirements.txt

      - name: Ma'lumotni yangilash va reponing o'ziga saqlash
        run: |
          python -m data.fetch_history --days 730 --time-budget 180
          mkdir -p db
          touch db/.gitkeep
          git config user.name "taxmin-kurs-bot"
          git config user.email "actions@users.noreply.github.com"
          git add db
          if ! git diff --cached --quiet; then
            git commit -m "chore: kurs ma'lumotlarini yangilash"
            push_ok=false
            for i in 1 2 3; do
              if git push origin HEAD:main; then
                push_ok=true
                break
              fi
              echo "Push muvaffaqiyatsiz (urinish $i/3), 5 soniyadan keyin qayta urinaman..."
              sleep 5
            done
            if [ "$push_ok" = false ]; then
              echo "::warning::Ma'lumotni push qilib bo'lmadi, lekin bot joriy (lokal) ma'lumot bilan davom etadi."
            fi
          else
            echo "Yangi ma'lumot yo'q, commit shart emas."
          fi

      - name: Botni ishga tushirish
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python -m bot.main
