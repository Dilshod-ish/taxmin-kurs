name: Telegram bot

on:
  # schedule:
  #   - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: telegram-bot-runner
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - name: Kodni olish
        uses: actions/checkout@v4

      - name: Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kutubxonalarni o'rnatish
        run: pip install -r requirements.txt

      - name: Ma'lumotni yangilash va reponing o'ziga saqlash
        run: |
          python -m data.fetch_history --days 400 --time-budget 120
          git config user.name "taxmin-kurs-bot"
          git config user.email "actions@users.noreply.github.com"
          git add db models
          if ! git diff --cached --quiet; then
            git commit -m "chore: kurs ma'lumotlarini yangilash"
            git push origin HEAD:main
          else
            echo "Yangi ma'lumot yo'q, commit shart emas."
          fi

      - name: Botni ishga tushirish
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python -m bot.main
