name: Telegram bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: telegram-bot-runner
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - name: Kodni olish
        uses: actions/checkout@v4

      - name: Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kutubxonalarni o'rnatish
        run: pip install -r requirements.txt

      - name: Avvalgi ma'lumot va modellarni tiklash
        uses: actions/cache@v4
        with:
          path: |
            db
            models
          key: bot-data-${{ github.run_id }}
          restore-keys: |
            bot-data-

      - name: Botni ishga tushirish
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python -m bot.main
